<section class="pointer-events-none fixed right-4 top-4 z-50 grid gap-3" aria-live="polite" aria-atomic="true">
  @for (message of messages(); track message.id) {
    <article
      class="pointer-events-auto w-[min(92vw,24rem)] rounded-2xl border border-white/10 bg-slate-950/95 p-4 text-white shadow-2xl shadow-black/25 backdrop-blur-md"
      [ngClass]="{
        'border-emerald-400/40': message.type === 'success',
        'border-rose-400/40': message.type === 'error',
        'border-sky-400/40': message.type === 'info'
      }"
    >
      <div class="flex items-start justify-between gap-3">
        <div class="grid gap-1">
          <p class="m-0 text-sm font-semibold uppercase tracking-[0.16em] text-slate-300">
            {{ message.title }}
          </p>
          <p class="m-0 text-sm leading-6 text-slate-100">
            {{ message.description }}
          </p>
        </div>

        <button
          type="button"
          class="rounded-full border border-white/15 px-2 py-1 text-xs font-semibold text-slate-200 transition hover:border-white/30 hover:text-white"
          (click)="dismiss(message.id)"
          aria-label="Dismiss notification"
        >
          Close
        </button>
      </div>
    </article>
  }
</section>
